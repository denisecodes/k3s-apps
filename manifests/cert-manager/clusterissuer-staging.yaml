apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt staging server
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Email will be provided via SealedSecret or local configuration
    # You'll create a SealedSecret with your email and apply it separately
    email: placeholder@example.com  # This will be patched by your SealedSecret workflow
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: traefik
