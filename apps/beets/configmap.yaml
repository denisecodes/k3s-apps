apiVersion: v1
kind: ConfigMap
metadata:
  name: beets-config
  namespace: jellyfin
data:
  config.yaml: |
    directory: /media/music
    library: /config/musiclibrary.db
    import:
      move: no
      copy: no
      write: yes
      autotag: yes
      timid: no
      log: /config/import.log
      none_rec_action: asis  # if no match found at all, import as-is rather than skip
    plugins:
      - fetchart
      - embedart
      - lastgenre
    lastgenre:
      count: 1
      prefer_specific: yes
      source: track
    fetchart:
      auto: yes
    embedart:
      auto: yes
    match:
      strong_rec_thresh: 0.90   # anything below this = strong = auto-apply in quiet mode
      medium_rec_thresh: 0.90   # same as strong = no medium zone, so nothing gets skipped
                                # distances >= 0.90 fall to none_rec_action: asis
