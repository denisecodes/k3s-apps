apiVersion: v1
kind: ConfigMap
metadata:
  name: beets-config
  namespace: navidrome
data:
  config.yaml: |
    directory: /music
    library: /config/musiclibrary.db
    import:
      move: no
      copy: no
      write: yes
      autotag: yes
      timid: no
      log: /config/import.log
      none_rec_action: asis
    plugins:
      - fetchart
      - embedart
      - lastgenre
    lastgenre:
      count: 1
      prefer_specific: yes
      source: track
      force: yes
      canonical: yes
    fetchart:
      auto: yes
    embedart:
      auto: yes
    match:
      strong_rec_thresh: 0.90
      medium_rec_thresh: 0.90
