apiVersion: batch/v1
kind: CronJob
metadata:
  name: beets-tagger
  namespace: navidrome
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
        spec:
          containers:
          - name: beets
            image: lscr.io/linuxserver/beets:latest
            command: ["/bin/bash", "-c"]
            args:
              - |
                echo "Setting up beets config..."
                mkdir -p /config
                cp /beets-config/config.yaml /config/config.yaml

                echo "Step 1: Importing music into beets library..."
                beet -c /config/config.yaml import -q /music

                echo "Step 2: Fetching and writing genres..."
                beet -c /config/config.yaml lastgenre

                echo "Step 3: Fetching and embedding artwork..."
                beet -c /config/config.yaml fetchart
                yes | beet -c /config/config.yaml embedart

                echo "Tagging complete!"
                echo "--- import.log ---"
                cat /config/import.log
            env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            volumeMounts:
            - name: music
              mountPath: /music
            - name: beets-config
              mountPath: /beets-config
            - name: beets-data
              mountPath: /config
          volumes:
          - name: music
            persistentVolumeClaim:
              claimName: navidrome-music
          - name: beets-config
            configMap:
              name: beets-config
          - name: beets-data
            emptyDir: {}
          restartPolicy: Never
      backoffLimit: 1
