apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: beets-tagger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/denisecodes/k3s-apps
    targetRevision: HEAD
    path: apps/beets
    directory:
      exclude: 'application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  # No syncPolicy.automated — sync manually when you want to run the job
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
