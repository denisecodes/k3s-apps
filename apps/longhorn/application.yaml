apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    targetRevision: 1.11.1
    chart: longhorn
    helm:
      values: |
        # Disable pre-upgrade checker for ArgoCD/GitOps deployments
        # This prevents the pre-upgrade hook from running on fresh installs
        preUpgradeChecker:
          jobEnabled: false
        # Default StorageClass
        defaultSettings:
          defaultStorageClass: longhorn
        # Number of replicas for each volume
        persistence:
          defaultClassReplicaCount: 1
        # Longhorn UI settings
        service:
          ui:
            type: ClusterIP
        # Enable monitoring
        metrics:
          serviceMonitor:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    # Note: automated sync disabled due to Longhorn Helm chart pre-upgrade hook issue
    # On fresh install, the hook fails because it needs resources that don't exist yet
    # Manual sync required for first install - subsequent syncs work fine
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - Replace=true
