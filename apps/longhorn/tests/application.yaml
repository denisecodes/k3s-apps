apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/denisecodes/k3s-apps
    targetRevision: HEAD
    path: apps/longhorn/tests
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
