# Jellyfin Helm Chart Values Override
# Chart: jellyfin/jellyfin v3.2.0
# App: Jellyfin v10.11.8
# Cluster: k3s v1.33.10+k3s1

# Persistence configuration
persistence:
  # Config volume (database, settings, metadata)
  config:
    enabled: true
    size: 10Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep
  
  # Cache volume (transcoding temp files)
  cache:
    enabled: true
    type: pvc
    size: 50Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep
  
  # Disable built-in media volume (using manual PVCs for consistency)
  media:
    enabled: false

# Media volumes (manual PVCs for better organization)
volumes:
  # Movies PVC (references pvcs/media-movies.yaml)
  - name: media-movies
    persistentVolumeClaim:
      claimName: jellyfin-media-movies
  
  # TV shows PVC (references pvcs/media-tv.yaml)
  - name: media-tv
    persistentVolumeClaim:
      claimName: jellyfin-media-tv
  
  # Music PVC (references pvcs/media-music.yaml)
  - name: media-music
    persistentVolumeClaim:
      claimName: jellyfin-media-music

volumeMounts:
  # Mount movies at /media/movies
  - name: media-movies
    mountPath: /media/movies
  
  # Mount TV shows at /media/tv
  - name: media-tv
    mountPath: /media/tv
  
  # Mount music at /media/music
  - name: media-music
    mountPath: /media/music

# Resource limits for 4K transcoding with Intel Quick Sync
# GPU resource request enables hardware acceleration via Intel GPU Device Plugin
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 8Gi
    gpu.intel.com/i915: 1

# Service configuration
service:
  type: NodePort
  port: 8096

# Disable built-in ingress (using Traefik IngressRoute)
ingress:
  enabled: false

# Health probes - allow extra time for startup with large libraries
startupProbe:
  failureThreshold: 60
  periodSeconds: 10
  initialDelaySeconds: 0

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
