apiVersion: v1
kind: Pod
metadata:
  name: jellyfin-migration
  namespace: jellyfin
  labels:
    app: jellyfin-migration
    purpose: storage-migration
spec:
  restartPolicy: Never
  serviceAccountName: default
  
  containers:
    - name: migration-helper
      image: alpine:latest
      
      # Install rsync on container startup
      command:
        - sh
        - -c
        - |
          apk add --no-cache rsync
          echo "=== Jellyfin Storage Migration Pod Ready ==="
          echo "Use kubectl exec to run rsync commands"
          echo "Available mount points:"
          mount | grep /data
          sleep infinity
      
      # Keep container running for manual rsync operations
      stdin: true
      tty: true
      
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 2000m
          memory: 2Gi
      
      volumeMounts:
        # Old volumes (read-only for safety)
        - name: old-movies
          mountPath: /old-data/movies
          readOnly: true
        - name: old-tv
          mountPath: /old-data/tv
          readOnly: true
        - name: old-cache
          mountPath: /old-data/cache
          readOnly: true
        
        # New volumes (read-write for migration target)
        - name: new-movies
          mountPath: /new-data/movies
        - name: new-tv
          mountPath: /new-data/tv
        - name: new-cache
          mountPath: /new-data/cache
  
  volumes:
    # Old PVCs (source - current volumes with old data)
    - name: old-movies
      persistentVolumeClaim:
        claimName: jellyfin-media-movies
        readOnly: true
    - name: old-tv
      persistentVolumeClaim:
        claimName: jellyfin-media-tv
        readOnly: true
    - name: old-cache
      persistentVolumeClaim:
        claimName: jellyfin-cache
        readOnly: true
    
    # New PVCs (target - larger new volumes)
    - name: new-movies
      persistentVolumeClaim:
        claimName: jellyfin-media-movies-new
    - name: new-tv
      persistentVolumeClaim:
        claimName: jellyfin-media-tv-new
    - name: new-cache
      persistentVolumeClaim:
        claimName: jellyfin-cache-new
