apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jellyfin-credentials
  namespace: jellyfin
spec:
  encryptedData:
    # TODO: Replace with your sealed admin password
    # 
    # To create this secret:
    # 1. Create a temporary file with your desired admin password:
    #    echo -n "YOUR_SECURE_PASSWORD" > /tmp/password.txt
    # 
    # 2. Create a Kubernetes secret:
    #    kubectl create secret generic jellyfin-credentials \
    #      --from-file=admin-password=/tmp/password.txt \
    #      --dry-run=client -o yaml > /tmp/jellyfin-secret.yaml
    # 
    # 3. Seal the secret:
    #    kubeseal --format=yaml --cert=<path-to-sealed-secrets-cert> \
    #      < /tmp/jellyfin-secret.yaml > /tmp/jellyfin-sealed.yaml
    # 
    # 4. Copy the encryptedData.admin-password value from /tmp/jellyfin-sealed.yaml
    #    and paste it below, replacing this comment
    # 
    # 5. Delete temporary files:
    #    rm /tmp/password.txt /tmp/jellyfin-secret.yaml /tmp/jellyfin-sealed.yaml
    #
    admin-password: <REPLACE_WITH_YOUR_SEALED_PASSWORD>
  template:
    metadata:
      name: jellyfin-credentials
      namespace: jellyfin
    type: Opaque
