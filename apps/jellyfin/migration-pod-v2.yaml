apiVersion: v1
kind: Pod
metadata:
  name: jellyfin-migration-v2
  namespace: jellyfin
  labels:
    app: jellyfin-migration-v2
    purpose: storage-migration-v2
spec:
  restartPolicy: Never
  serviceAccountName: default
  
  containers:
    - name: migration-helper
      image: alpine:latest
      
      command:
        - sh
        - -c
        - |
          apk add --no-cache rsync
          echo "=== Jellyfin Storage Migration V2 Ready ==="
          sleep infinity
      
      stdin: true
      tty: true
      
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 2000m
          memory: 2Gi
      
      volumeMounts:
        # Old volumes (read-only, terminating but still have data)
        - name: old-movies
          mountPath: /old-data/movies
          readOnly: true
        - name: old-tv
          mountPath: /old-data/tv
          readOnly: true
        - name: old-cache
          mountPath: /old-data/cache
          readOnly: true
        
        # New volumes (read-write for migration target)
        - name: new-movies
          mountPath: /new-data/movies
        - name: new-tv
          mountPath: /new-data/tv
        - name: new-cache
          mountPath: /new-data/cache
  
  volumes:
    # Old PVCs (source - still have data)
    - name: old-movies
      persistentVolumeClaim:
        claimName: jellyfin-media-movies-new
        readOnly: true
    - name: old-tv
      persistentVolumeClaim:
        claimName: jellyfin-media-tv-new
        readOnly: true
    - name: old-cache
      persistentVolumeClaim:
        claimName: jellyfin-cache-new
        readOnly: true
    
    # New PVCs (target - empty, need data)
    - name: new-movies
      persistentVolumeClaim:
        claimName: jellyfin-movies
    - name: new-tv
      persistentVolumeClaim:
        claimName: jellyfin-tv
    - name: new-cache
      persistentVolumeClaim:
        claimName: jellyfin-cache
