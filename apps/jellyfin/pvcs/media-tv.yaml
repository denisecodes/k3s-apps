apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-tv
  namespace: jellyfin
  annotations:
    # Ensure pvc is created and bound first via longhorn
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: jellyfin
    media-type: tv
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  volumeName: pvc-e8296f92-5d7e-47dc-9892-f9633dc28884
  resources:
    requests:
      storage: 2Ti
