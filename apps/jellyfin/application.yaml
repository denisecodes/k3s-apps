apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart source - Official Jellyfin chart
    - repoURL: https://jellyfin.github.io/jellyfin-helm/
      chart: jellyfin
      targetRevision: 3.2.0
      helm:
        valueFiles:
          - $values/apps/jellyfin/values.yaml
    # Git repo source for values.yaml
    - repoURL: https://github.com/denisecodes/k3s-apps
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
