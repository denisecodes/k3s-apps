apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  namespace: navidrome
  annotations:
    # Ensure pvc is created and bound first via longhorn
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: navidrome
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi