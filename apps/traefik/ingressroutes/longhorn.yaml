---
# Traefik IngressRoute for Longhorn UI
# Access Longhorn via: http://longhorn.denise.home
#
# Prerequisites:
#   - Traefik is running with LoadBalancer service
#   - dnsmasq is configured to resolve *.denise.home to Traefik LoadBalancer IP
#   - Longhorn is installed and running

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-frontend
  namespace: longhorn-system
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web  # HTTP entry point (port 80)
  routes:
    - match: Host(`longhorn.denise.home`)
      kind: Rule
      services:
        - name: longhorn-frontend
          port: 80
