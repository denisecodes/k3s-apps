---
# Traefik IngressRoute for Traefik Dashboard
# Access Traefik Dashboard via: http://traefik.denise.home
#
# Prerequisites:
#   - Traefik is running with LoadBalancer service
#   - dnsmasq is configured to resolve *.denise.home to Traefik LoadBalancer IP
#   - Traefik dashboard is enabled (default in our config)
#
# Note: This exposes the dashboard on your LAN. For production environments,
# consider adding authentication middleware.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-external
  namespace: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web  # HTTP entry point (port 80)
  routes:
    - match: Host(`traefik.denise.home`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
